name: Build iOS App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Reinstall rollup (force native binary)
        run: npm install rollup --force

      - name: Rebuild native binaries
        run: npm rebuild

      - name: Patch iOS Podfile template to 15.0
        run: |
          mkdir -p /tmp/ios-template
          tar -xzf node_modules/@capacitor/cli/assets/ios-pods-template.tar.gz -C /tmp/ios-template
          sed -i '' "s/platform :ios, .*/platform :ios, '15.0'/" /tmp/ios-template/App/Podfile
          tar -czf node_modules/@capacitor/cli/assets/ios-pods-template.tar.gz -C /tmp/ios-template .

      - name: Build web assets
        run: npx vite build

      - name: Add iOS platform
        run: npx cap add ios

      - name: Set Xcode deployment target to 15.0
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' ios/App/App.xcodeproj/project.pbxproj

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        run: cd ios/App && pod install --repo-update

      - name: Build iOS (simulator, no signing)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath ios/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cafe-bara-ios-build
          path: ios/build/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 30
