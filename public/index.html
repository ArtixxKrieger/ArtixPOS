<!DOCTYPE html>
<html>
<head>
  <title>Café Bara POS</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      color: white;
      padding: 20px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 30px;
    }
    .status {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      padding: 15px 30px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .status.success {
      background: rgba(34, 197, 94, 0.3);
      border: 1px solid rgba(34, 197, 94, 0.5);
    }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>☕ Café Bara POS</h1>
    <p>Point of Sale System</p>
    <div class="status success">
      <strong>✓ Server is running</strong>
    </div>
    <p>The backend API is ready to serve your requests.</p>
    <a href="/app">Go to Application</a>
  </div>
</body>
</html>
