name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npx vite build

      - name: Add Android platform
        run: npx cap add android

      - name: Patch build.gradle for Java 21
        run: |
          sed -i 's/sourceCompatibility JavaVersion.VERSION_[0-9_]*/sourceCompatibility JavaVersion.VERSION_21/g' android/app/build.gradle
          sed -i 's/targetCompatibility JavaVersion.VERSION_[0-9_]*/targetCompatibility JavaVersion.VERSION_21/g' android/app/build.gradle
          sed -i 's/jvmTarget = "[^"]*"/jvmTarget = "21"/g' android/app/build.gradle
          echo "--- android/app/build.gradle (compileOptions section) ---"
          grep -A4 "compileOptions" android/app/build.gradle || true
          grep "jvmTarget" android/app/build.gradle || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Clean and build debug APK
        run: cd android && ./gradlew clean assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cafe-bara-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
